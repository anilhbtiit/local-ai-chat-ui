<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  background: #343541;
  color: white;
}

#sidebar {
  width: 250px;
  background: #202123;
  padding: 10px;
  overflow-y: auto;
}

#chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  max-width: 70%;
}

.user {
  background: #444654;
  margin-left: auto;
}

.ai {
  background: #202123;
}

#input {
  display: flex;
  padding: 10px;
  background: #202123;
  gap: 10px;
}
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div id="conversations"></div>
</div>

<div id="chat-container">
  <div id="chat"></div>

  <div id="input">
    <select id="model"></select>
    <textarea id="prompt"></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="/static/sidebar.js"></script>
<script src="/static/app.js"></script>

</body>
</html>
